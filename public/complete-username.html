<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星芽 · 设置用户名</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <script src="/track.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #fcfbf9;
            background-image: radial-gradient(900px 600px at 18% -12%, #eef7fd 0%, transparent 60%),
                              radial-gradient(900px 600px at 92% 4%, #fdf0e3 0%, transparent 58%),
                              linear-gradient(180deg,#fff 0%, #faf8f4 70%, #f3efe7 100%);
            background-attachment: fixed;
            min-height: 100vh; color: #1d1b18;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .card {
            background: #fff; border: none; border-radius: 24px;
            padding: 38px 32px; max-width: 400px; width: 90%; text-align: center;
            position: relative;
            box-shadow: 0 18px 46px rgba(40,38,60,.12), 0 4px 12px rgba(40,38,60,.06);
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px;
            background: linear-gradient(90deg, #2f9be0, #2bb24c 45%, #f3960a); border-radius: 24px 24px 0 0;
        }
        .icon { font-size: 2.8rem; margin-bottom: 10px; }
        h2 { font-family: 'ZCOOL KuaiLe','PingFang SC',sans-serif; font-weight: 400; font-size: 1.7rem; margin-bottom: 8px; }
        p { color: #94908a; font-size: 0.9rem; margin-bottom: 24px; line-height: 1.5; }
        .form-input {
            width: 100%; padding: 13px 15px; border: 1.5px solid #e7e4dd; border-radius: 12px;
            font-size: 0.98rem; font-family: inherit; color: #1d1b18;
            background: #fbfaf7; outline: none; margin-bottom: 16px;
        }
        .form-input:focus { border-color: #2f9be0; }
        .submit-btn {
            width: 100%; padding: 15px; border: none; border-radius: 999px;
            background: linear-gradient(135deg, #3ccb63 0%, #28a847 100%); color: white; font-size: 1.05rem;
            font-family: inherit; font-weight: 700; cursor: pointer;
            box-shadow: 0 8px 22px rgba(43,178,76,.30); transition: transform .14s, box-shadow .14s, filter .14s;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 30px rgba(43,178,76,.38); filter: brightness(1.04); }
        .submit-btn:active { transform: scale(.98); }
        .message {
            margin-top: 14px; padding: 11px 14px; border-radius: 10px;
            font-size: 0.88rem; display: none;
        }
        .message.show { display: block; }
        .message.error { background: #fdecea; color: #f0564a; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">&#x270F;&#xFE0F;</div>
    <h2>设置用户名</h2>
    <p>Google 登录成功！请为你的账号选一个用户名。</p>
    <form onsubmit="handleSubmit(event)">
        <input class="form-input" id="username" placeholder="2-20 字符，支持中英文" required>
        <button class="submit-btn" type="submit">确认</button>
    </form>
    <div class="message" id="msg"></div>
</div>
<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login.html';

    const _redirect = new URLSearchParams(location.search).get('redirect') || '/';

    async function handleSubmit(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        try {
            const r = await fetch('/api/auth/complete-username', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`,
                },
                body: JSON.stringify({ username }),
            });
            const res = await r.json();
            if (r.ok) {
                localStorage.setItem('token', res.token);
                localStorage.setItem('user', JSON.stringify(res.user));
                window.location.href = decodeURIComponent(_redirect) || '/';
            } else {
                const el = document.getElementById('msg');
                el.textContent = res.error;
                el.className = 'message show error';
            }
        } catch (err) {
            const el = document.getElementById('msg');
            el.textContent = '网络错误: ' + err.message;
            el.className = 'message show error';
        }
    }
</script>
</body>
</html>
