<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星芽 · 管理后台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <script src="/track.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #fcfbf9; --card: #ffffff; --border: #ebe9e3;
            --text: #1d1b18; --dim: #94908a; --accent: #2f9be0;
            --accent-hover: #1f86c9; --good: #2bb24c; --warn: #e8920a; --bad: #f0564a;
            --inset: #f4f2ee; --ink: #1c1a17;
            --shadow-soft: 0 6px 18px rgba(40,38,60,.07);
            --shadow-card: 0 14px 36px rgba(40,38,60,.10), 0 3px 8px rgba(40,38,60,.05);
            --hand: 'ZCOOL KuaiLe','PingFang SC','Microsoft YaHei',sans-serif;
        }
        body {
            font-family: system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(900px 600px at 12% -14%, #eef7fd 0%, transparent 60%),
                              radial-gradient(900px 600px at 96% 2%, #fdf0e3 0%, transparent 55%),
                              linear-gradient(180deg,#fff 0%, #faf8f4 75%, #f3efe7 100%);
            background-attachment: fixed; color: var(--text); min-height: 100vh;
        }
        /* ===== 全栈统一 header（首页 UserBar 同款样式） ===== */
        .app-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 24px; border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.82); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            position: sticky; top: 0; z-index: 50;
        }
        .app-brand { font-family: var(--hand); font-size: 1.45rem; color: var(--text); text-decoration: none; line-height: 1; }
        .app-brand:hover { color: var(--accent); }
        .user-bar { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; }
        .user-avatar {
            width: 28px; height: 28px; border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #a78bfa); color: #fff;
            display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem;
        }
        .user-name { color: var(--text); font-weight: 500; }
        .user-logout {
            background: #fff; border: 1px solid #e0ddd5; border-radius: 12px;
            color: var(--dim); padding: 4px 10px; cursor: pointer; font-size: 0.78rem; font-family: inherit;
        }
        .user-logout:hover { color: var(--bad); border-color: var(--bad); }
        .user-parent-link, .user-admin-link {
            text-decoration: none; font-size: 0.82rem; font-weight: 600;
            padding: 5px 12px; border-radius: 12px; transition: all 0.15s;
        }
        .user-parent-link { color: #6a47b0; background: #e9e0f8; }
        .user-parent-link:hover { background: #d6c8f1; }
        .user-admin-link { color: var(--accent); background: #d4ebf9; }
        .user-admin-link.is-active { color: #1c5e8c; background: #b6dcf4; cursor: default; }
        @media (max-width: 560px) {
            .app-header { padding: 11px 14px; }
            .app-brand { font-size: 1.25rem; }
            .user-name { display: none; }
            .user-parent-link, .user-admin-link { padding: 4px 9px; font-size: 0.74rem; }
            .user-logout { padding: 3px 9px; font-size: 0.74rem; }
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .stat-card {
            background: var(--card); border: none; border-radius: 18px;
            padding: 22px; text-align: center; box-shadow: var(--shadow-soft);
        }
        .stat-num { font-family: var(--hand); font-size: 2.4rem; font-weight: 400; color: var(--accent); line-height: 1.1; }
        .stat-label { color: var(--dim); font-size: 0.82rem; margin-top: 4px; }
        .stats-grid .stat-card:nth-child(1) .stat-num { color: #2f9be0; }
        .stats-grid .stat-card:nth-child(2) .stat-num { color: #2bb24c; }
        .stats-grid .stat-card:nth-child(3) .stat-num { color: #ec7f2e; }
        .stats-grid .stat-card:nth-child(4) .stat-num { color: #6a47b0; }

        .section { background: var(--card); border: none; border-radius: 18px; padding: 22px; margin-bottom: 20px; box-shadow: var(--shadow-soft); }
        .section-title { font-family: var(--hand); font-size: 1.3rem; font-weight: 400; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

        .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .search-input {
            flex: 1; min-width: 200px; padding: 10px 15px; border: 1.5px solid var(--border);
            border-radius: 12px; background: var(--inset); color: var(--text); font-size: 0.92rem; outline: none; font-family: inherit;
        }
        .search-input:focus { border-color: var(--accent); }
        .toolbar-btn {
            padding: 10px 18px; border: none; border-radius: 12px;
            background: #fff; color: var(--text); cursor: pointer; font-size: 0.85rem; font-family: inherit; font-weight: 600;
            box-shadow: var(--shadow-soft); transition: all 0.15s;
        }
        .toolbar-btn:hover { color: var(--accent); transform: translateY(-1px); }

        table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
        th { text-align: left; color: var(--dim); font-weight: 600; padding: 12px 12px; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
        td { padding: 12px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        tr:hover td { background: #f5f9fd; }

        .badge {
            display: inline-block; padding: 3px 11px; border-radius: 999px; font-size: 0.75rem; font-weight: 700;
        }
        .badge-admin { background: #ece4f9; color: #6a47b0; }
        .badge-user { background: #efedea; color: #7a766f; }
        .badge-approved { background: #d9f3e1; color: #1f7a40; }
        .badge-pending { background: #fdeccc; color: #9a6800; }
        .badge-rejected { background: #fde0dc; color: #c0392b; }
        .badge-google { background: #e3eefe; color: #2a6fd6; }

        .actions { display: flex; gap: 6px; flex-wrap: wrap; }
        .act-btn {
            padding: 5px 12px; border-radius: 999px; border: 1px solid var(--border);
            background: #fff; color: var(--dim); cursor: pointer; font-size: 0.76rem; font-family: inherit;
            transition: all 0.15s;
        }
        .act-btn:hover { border-color: var(--accent); color: var(--accent); }
        .act-btn.danger:hover { border-color: var(--bad); color: var(--bad); }
        .act-btn.success:hover { border-color: var(--good); color: var(--good); }

        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 16px; }
        .page-btn {
            padding: 7px 15px; border: 1px solid var(--border); border-radius: 10px;
            background: #fff; color: var(--dim); cursor: pointer; font-size: 0.82rem; font-family: inherit;
        }
        .page-btn:hover { border-color: var(--accent); color: var(--accent); }
        .page-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }

        .empty { text-align: center; color: var(--dim); padding: 40px; }
        .loading { text-align: center; color: var(--dim); padding: 40px; }
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: var(--ink); color: #fff; border: none; border-radius: 14px;
            padding: 12px 22px; font-size: 0.88rem; z-index: 999; display: none;
            box-shadow: var(--shadow-card);
        }
        .toast.show { display: block; animation: fadeInUp 0.2s ease; }

        /* 行为数据 */
        .ev-cols { display: grid; grid-template-columns: 1fr 1.4fr; gap: 22px; }
        .ev-h { font-weight: 700; color: var(--dim); font-size: 0.85rem; margin-bottom: 12px; }
        .ev-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.82rem; }
        .ev-row .nm { width: 158px; flex: 0 0 158px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ev-row .bar { flex: 1; height: 8px; background: var(--inset); border-radius: 999px; overflow: hidden; }
        .ev-row .bar i { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), #2bb24c); border-radius: 999px; }
        .ev-row .ct { width: 48px; text-align: right; color: var(--dim); font-variant-numeric: tabular-nums; }
        .ev-feed { max-height: 380px; overflow: auto; }
        .ev-item { display: grid; grid-template-columns: 116px 130px 1fr; gap: 8px; padding: 8px 2px; border-bottom: 1px solid var(--border); font-size: 0.8rem; align-items: baseline; }
        .ev-item .t { color: var(--dim); white-space: nowrap; font-variant-numeric: tabular-nums; }
        .ev-item .ev { font-weight: 700; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ev-item .pp { color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .ev-item .pp b { color: var(--text); font-weight: 600; }

        /* 邮件推广 */
        .em-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
        .em-pill { background: var(--inset); border-radius: 999px; padding: 6px 14px; font-size: 0.82rem; color: var(--dim); font-weight: 600; }
        .em-pill b { color: var(--text); }
        .em-pill.warn { background: #fdeee6; color: #a84b2f; }
        .em-body { width: 100%; padding: 12px 15px; border: 1.5px solid var(--border); border-radius: 12px; background: var(--inset); color: var(--text); font-size: 0.88rem; font-family: ui-monospace, Menlo, monospace; outline: none; resize: vertical; }
        .em-body:focus { border-color: var(--accent); }
        .em-send-btn { background: var(--good); color: #fff; }
        .em-send-btn:hover { color: #fff; opacity: 0.9; }
        #emStatus { margin-top: 10px; font-size: 0.85rem; font-weight: 600; }
        .em-row { display: flex; align-items: center; gap: 12px; padding: 9px 2px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .em-row .t { color: var(--dim); flex: 0 0 150px; font-size: 0.78rem; }
        .em-row .s { flex: 1; font-weight: 600; }
        .em-row .c { color: var(--dim); }

        /* 使用分析 */
        .an-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
        .funnel-step { margin-bottom: 12px; }
        .funnel-step .fl-top { display: flex; justify-content: space-between; align-items: baseline; font-size: 0.85rem; margin-bottom: 5px; }
        .funnel-step .fl-label { color: var(--text); font-weight: 600; }
        .funnel-step .fl-val { color: var(--dim); font-variant-numeric: tabular-nums; }
        .funnel-step .fl-val b { color: var(--accent); }
        .funnel-step .fl-bar { height: 24px; background: var(--inset); border-radius: 8px; overflow: hidden; }
        .funnel-step .fl-bar i { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), #2bb24c); border-radius: 8px; transition: width .4s; }
        .an-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; font-size: 0.84rem; }
        .an-row .nm { width: 70px; flex: 0 0 70px; color: var(--text); }
        .an-row .bar { flex: 1; height: 10px; background: var(--inset); border-radius: 999px; overflow: hidden; }
        .an-row .bar i { display: block; height: 100%; border-radius: 999px; background: var(--accent); }
        .an-row .ct { width: 92px; text-align: right; color: var(--dim); font-variant-numeric: tabular-nums; }
        .hour-bars { display: flex; align-items: flex-end; gap: 3px; height: 96px; margin-bottom: 20px; }
        .hour-bars .hb { flex: 1; background: linear-gradient(180deg, var(--accent), #8fcdef); border-radius: 4px 4px 0 0; min-height: 2px; position: relative; }
        .hour-bars .hb b { position: absolute; bottom: -17px; left: -4px; right: -4px; text-align: center; font-size: 0.6rem; color: var(--dim); font-weight: 400; }
        .an-table { width: 100%; font-size: 0.82rem; }
        .an-table .r { display: grid; grid-template-columns: 1.3fr 1fr 1fr 1fr; gap: 6px; padding: 7px 0; border-bottom: 1px solid var(--border); }
        .an-table .r.head { color: var(--dim); font-weight: 600; }
        .an-table .r .new { color: var(--good); }
        .an-table .r .ret { color: var(--accent); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

        @media (max-width: 640px) {
            .container { padding: 14px; }
            .top-bar { padding: 12px 16px; }
            .top-bar h1 { font-size: 1.25rem; }
            .stats-grid { gap: 12px; }
            .stat-card { padding: 16px; }
            .stat-num { font-size: 2rem; }
            .section { padding: 16px; }
            .toolbar { gap: 8px; }
            .search-input { min-width: 0; }

            /* 用户表格 -> 堆叠卡片 */
            table, tbody, tr, td { display: block; width: 100%; }
            thead { display: none; }
            table { font-size: 0.9rem; }
            tr {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 16px;
                box-shadow: var(--shadow-soft);
                padding: 12px 16px;
                margin-bottom: 12px;
            }
            tr:hover td { background: transparent; }
            td {
                border: none;
                padding: 7px 0;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
            }
            td + td { border-top: 1px dashed var(--border); }
            td::before {
                content: attr(data-label);
                color: var(--dim);
                font-size: 0.78rem;
                font-weight: 600;
                flex: 0 0 auto;
            }
            .col-email { display: flex; }
            td[data-label="用户名"] strong { font-size: 1.05rem; }
            td[data-label="邮箱"] { word-break: break-all; text-align: right; }

            /* 操作: 标题在上, 按钮整行铺开 */
            .td-actions { display: block; padding-top: 12px; margin-top: 4px; }
            .td-actions::before { display: block; margin-bottom: 8px; }
            .td-actions .actions { gap: 8px; }
            .act-btn { padding: 8px 14px; font-size: 0.82rem; }

            /* 分析 + 行为数据: 两栏改成上下堆叠 */
            .an-grid { grid-template-columns: 1fr; gap: 18px; }
            .ev-cols { grid-template-columns: 1fr; gap: 18px; }
            .ev-feed { max-height: none; }
            .ev-item { grid-template-columns: 1fr; gap: 2px; padding: 10px 2px; }
            .ev-item .t { font-size: 0.74rem; }
            .ev-item .pp { white-space: normal; }
        }
    </style>
</head>
<body>
    <header class="app-header">
        <a class="app-brand" href="/">&#x1F331; 星芽</a>
        <div class="user-bar">
            <a class="user-parent-link" href="/?parent=1">家长</a>
            <span class="user-admin-link is-active" aria-current="page">管理后台</span>
            <span class="user-avatar" id="ubAvatar"></span>
            <span class="user-name" id="ubName"></span>
            <button class="user-logout" id="ubLogout">退出</button>
        </div>
    </header>
    <div class="container">
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><div class="stat-num" id="statTotal">-</div><div class="stat-label">总用户</div></div>
            <div class="stat-card"><div class="stat-num" id="statToday">-</div><div class="stat-label">今日新增</div></div>
            <div class="stat-card"><div class="stat-num" id="statWeek">-</div><div class="stat-label">本周新增</div></div>
            <div class="stat-card"><div class="stat-num" id="statGoogle">-</div><div class="stat-label">Google 用户</div></div>
        </div>

        <div class="section">
            <div class="section-title">&#x1F4C8; 使用分析</div>
            <div class="an-grid">
                <div class="an-box">
                    <div class="ev-h">访客漏斗</div>
                    <div id="anFunnel"><div class="loading">加载中...</div></div>
                </div>
                <div class="an-box">
                    <div class="ev-h">学科热度</div>
                    <div id="anSubjects"></div>
                    <div class="ev-h" style="margin-top:18px;">登录转化</div>
                    <div id="anLogin"></div>
                </div>
            </div>
            <div class="an-grid" style="margin-top:18px;">
                <div class="an-box">
                    <div class="ev-h">活跃时段（北京时间）</div>
                    <div id="anHours"></div>
                </div>
                <div class="an-box">
                    <div class="ev-h">每日活跃 · 新增 vs 回访（设备）</div>
                    <div id="anDaily"></div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">&#x1F4E3; 邮件推广</div>
            <div class="em-meta" id="emMeta"><div class="loading">加载中...</div></div>
            <div class="em-form">
                <input class="search-input" id="emSubject" placeholder="邮件主题,如: 星芽上新:考试日历来了!" style="margin-bottom:10px;">
                <textarea class="em-body" id="emBody" rows="9" placeholder="邮件 HTML 内容。支持占位符: {{USERNAME}} 收件人用户名 / {{UNSUB_URL}} 退订链接(不写会自动追加退订页脚)"></textarea>
                <div class="toolbar" style="margin-top:10px;">
                    <button class="toolbar-btn" onclick="emFillTemplate()">&#x1F4C5; 插入模板:考试日历上线</button>
                    <button class="toolbar-btn" onclick="emPreview()">&#x1F441; 预览</button>
                    <span style="flex:1"></span>
                    <button class="toolbar-btn" onclick="emSend(true)">发我测试一封</button>
                    <button class="toolbar-btn em-send-btn" onclick="emSend(false)">&#x1F680; 正式发送</button>
                </div>
                <div id="emStatus"></div>
            </div>
            <div class="ev-h" style="margin-top:18px;">发送历史</div>
            <div id="emHistory"><div class="loading">加载中...</div></div>
        </div>

        <div class="section">
            <div class="section-title">&#x1F465; 用户列表</div>
            <div class="toolbar">
                <input class="search-input" id="searchInput" placeholder="搜索用户名或邮箱..." onkeydown="if(event.key==='Enter')searchUsers()">
                <button class="toolbar-btn" onclick="searchUsers()">搜索</button>
                <button class="toolbar-btn" onclick="loadUsers(1,'')">重置</button>
            </div>
            <div id="userTable"><div class="loading">加载中...</div></div>
            <div class="pagination" id="pagination"></div>
        </div>

        <div class="section">
            <div class="section-title">&#x1F4CA; 行为数据</div>
            <div class="stats-grid" style="margin-bottom:18px;">
                <div class="stat-card"><div class="stat-num" id="evTotal">-</div><div class="stat-label">总事件</div></div>
                <div class="stat-card"><div class="stat-num" id="evToday">-</div><div class="stat-label">今日事件</div></div>
                <div class="stat-card"><div class="stat-num" id="evUsers">-</div><div class="stat-label">活跃用户</div></div>
                <div class="stat-card"><div class="stat-num" id="evAnons">-</div><div class="stat-label">设备数</div></div>
            </div>
            <div class="ev-cols">
                <div>
                    <div class="ev-h">事件分布</div>
                    <div id="evByEvent"><div class="loading">加载中...</div></div>
                </div>
                <div>
                    <div class="ev-h">最近事件（北京时间）</div>
                    <div id="evRecent"><div class="loading">加载中...</div></div>
                </div>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>

<script>
const token = localStorage.getItem('token');
if (!token) { window.location.href = '/login.html?redirect=/admin.html'; }

const userInfo = JSON.parse(localStorage.getItem('user') || '{}');
if (userInfo.role !== 'admin') {
    document.querySelector('.container').innerHTML = '<div class="empty" style="margin-top:80px;">&#x1F6AB; 仅管理员可访问</div>';
}
// 统一 header: 头像 / 用户名 / 退出（与首页 UserBar 行为一致）
const ubName = userInfo.username || '';
document.getElementById('ubName').textContent = ubName;
document.getElementById('ubAvatar').textContent = ubName ? ubName.charAt(0).toUpperCase() : '·';
document.getElementById('ubLogout').addEventListener('click', () => {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '/';
});

const headers = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
let currentPage = 1;
let currentSearch = '';

async function loadStats() {
    try {
        const r = await fetch('/api/admin/stats', { headers });
        if (!r.ok) throw new Error();
        const d = await r.json();
        document.getElementById('statTotal').textContent = d.total;
        document.getElementById('statToday').textContent = d.today;
        document.getElementById('statWeek').textContent = d.week;
        document.getElementById('statGoogle').textContent = d.google;
    } catch {}
}

async function loadUsers(page, search) {
    currentPage = page;
    currentSearch = search;
    const params = new URLSearchParams({ page: String(page), size: '20' });
    if (search) params.set('q', search);

    try {
        const r = await fetch('/api/admin/users?' + params, { headers });
        if (!r.ok) throw new Error();
        const d = await r.json();
        renderTable(d.users);
        renderPagination(d.page, d.pages);
    } catch {
        document.getElementById('userTable').innerHTML = '<div class="empty">加载失败</div>';
    }
}

// created_at is stored as UTC (SQLite datetime('now')); show it in Beijing time (UTC+8).
function fmtBeijing(s) {
    if (!s) return '-';
    const base = s.replace(' ', 'T').replace(/(\.\d+)?Z?$/, '');
    const d = new Date(base + 'Z');
    if (isNaN(d.getTime())) return s.replace('T', ' ').slice(0, 16);
    const b = new Date(d.getTime() + 8 * 3600 * 1000);
    const p = n => String(n).padStart(2, '0');
    return `${b.getUTCFullYear()}-${p(b.getUTCMonth() + 1)}-${p(b.getUTCDate())} ${p(b.getUTCHours())}:${p(b.getUTCMinutes())}`;
}

function renderTable(users) {
    if (!users.length) {
        document.getElementById('userTable').innerHTML = '<div class="empty">暂无用户</div>';
        return;
    }
    let html = `<table>
        <thead><tr>
            <th>ID</th><th>用户名</th><th class="col-email">邮箱</th>
            <th>角色</th><th>状态</th><th>登录方式</th><th>注册时间</th><th>操作</th>
        </tr></thead><tbody>`;

    for (const u of users) {
        const roleBadge = u.role === 'admin'
            ? '<span class="badge badge-admin">管理员</span>'
            : '<span class="badge badge-user">用户</span>';
        const statusBadge = u.status === 'approved'
            ? '<span class="badge badge-approved">正常</span>'
            : u.status === 'pending'
            ? '<span class="badge badge-pending">待审</span>'
            : '<span class="badge badge-rejected">拒绝</span>';
        const authType = u.google_sub
            ? '<span class="badge badge-google">Google</span>'
            : '<span class="badge badge-user">密码</span>';
        const time = fmtBeijing(u.created_at);

        let actions = '<div class="actions">';
        if (u.role !== 'admin') {
            actions += `<button class="act-btn success" onclick="doAction('promote',${u.id})">设管理员</button>`;
        } else {
            actions += `<button class="act-btn" onclick="doAction('demote',${u.id})">取消管理员</button>`;
        }
        if (u.status !== 'approved') {
            actions += `<button class="act-btn success" onclick="doAction('approve',${u.id})">通过</button>`;
        }
        if (u.status !== 'rejected') {
            actions += `<button class="act-btn danger" onclick="doAction('reject',${u.id})">禁用</button>`;
        }
        actions += `<button class="act-btn danger" onclick="if(confirm('确定删除用户 ${u.username}？'))doAction('delete',${u.id})">删除</button>`;
        actions += '</div>';

        html += `<tr>
            <td data-label="ID">${u.id}</td>
            <td data-label="用户名"><strong>${esc(u.username)}</strong></td>
            <td class="col-email" data-label="邮箱">${esc(u.email || '-')}</td>
            <td data-label="角色">${roleBadge}</td>
            <td data-label="状态">${statusBadge}</td>
            <td data-label="登录方式">${authType}</td>
            <td data-label="注册时间" style="color:var(--dim)">${time}</td>
            <td class="td-actions" data-label="操作">${actions}</td>
        </tr>`;
    }
    html += '</tbody></table>';
    document.getElementById('userTable').innerHTML = html;
}

function renderPagination(page, pages) {
    if (pages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
    let html = '';
    html += `<button class="page-btn" onclick="loadUsers(${page - 1},'${currentSearch}')" ${page <= 1 ? 'disabled' : ''}>&#x2190;</button>`;
    for (let i = 1; i <= pages; i++) {
        if (pages > 7 && i > 3 && i < pages - 2 && Math.abs(i - page) > 1) {
            if (i === 4 || i === pages - 3) html += '<span style="color:var(--dim);padding:0 4px">...</span>';
            continue;
        }
        html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="loadUsers(${i},'${currentSearch}')">${i}</button>`;
    }
    html += `<button class="page-btn" onclick="loadUsers(${page + 1},'${currentSearch}')" ${page >= pages ? 'disabled' : ''}>&#x2192;</button>`;
    document.getElementById('pagination').innerHTML = html;
}

async function doAction(action, userId) {
    try {
        const r = await fetch('/api/admin/user-action', {
            method: 'POST', headers,
            body: JSON.stringify({ action, userId }),
        });
        const d = await r.json();
        if (r.ok) {
            showToast(d.message || '操作成功');
            loadUsers(currentPage, currentSearch);
            loadStats();
        } else {
            showToast(d.error || '操作失败');
        }
    } catch {
        showToast('网络错误');
    }
}

function searchUsers() {
    const q = document.getElementById('searchInput').value.trim();
    loadUsers(1, q);
}

function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
}

function esc(s) {
    const d = document.createElement('div');
    d.textContent = s == null ? '' : s;
    return d.innerHTML;
}

async function loadEvents() {
    try {
        const r = await fetch('/api/admin/events', { headers });
        if (!r.ok) throw new Error();
        const d = await r.json();
        document.getElementById('evTotal').textContent = d.total;
        document.getElementById('evToday').textContent = d.today;
        document.getElementById('evUsers').textContent = d.users;
        document.getElementById('evAnons').textContent = d.anons;

        const max = Math.max(1, ...d.byEvent.map(e => e.c));
        document.getElementById('evByEvent').innerHTML = d.byEvent.length
            ? d.byEvent.map(e =>
                `<div class="ev-row"><span class="nm">${esc(e.event)}</span>` +
                `<span class="bar"><i style="width:${Math.round(e.c / max * 100)}%"></i></span>` +
                `<span class="ct">${e.c}</span></div>`).join('')
            : '<div class="empty">暂无数据</div>';

        document.getElementById('evRecent').innerHTML = d.recent.length
            ? '<div class="ev-feed">' + d.recent.map(e => {
                let pp = '';
                try {
                    const o = JSON.parse(e.props || '{}');
                    pp = Object.keys(o).map(k => `${k}=<b>${esc(o[k])}</b>`).join(' · ');
                } catch (_) {}
                const who = esc(e.username || (e.anon_id ? e.anon_id.slice(0, 8) : '匿名'));
                return `<div class="ev-item"><span class="t">${fmtBeijing(e.created_at)}</span>` +
                    `<span class="ev">${esc(e.event)}</span><span class="pp">${who}${pp ? ' · ' + pp : ''}</span></div>`;
            }).join('') + '</div>'
            : '<div class="empty">暂无数据</div>';
    } catch (e) {
        document.getElementById('evByEvent').innerHTML = '<div class="empty">加载失败</div>';
        document.getElementById('evRecent').innerHTML = '';
    }
}

const SUBJ_LABEL = { math: '数学', chinese: '语文', english: '英语' };
async function loadAnalytics() {
    try {
        const r = await fetch('/api/admin/analytics', { headers });
        if (!r.ok) throw new Error();
        const d = await r.json();

        // 漏斗
        const f = d.funnel || {};
        const steps = [
            ['访问设备', f.devices, ''],
            ['点了学科', f.tried, f.devices ? Math.round(100 * f.tried / f.devices) : 0],
            ['撞到登录墙', f.wall, f.tried ? Math.round(100 * f.wall / f.tried) : 0],
            ['登录成功', f.logged_in, f.wall ? Math.round(100 * f.logged_in / f.wall) : 0],
        ];
        const fmax = Math.max(1, f.devices || 1);
        document.getElementById('anFunnel').innerHTML = steps.map(([label, val, pct], i) =>
            `<div class="funnel-step"><div class="fl-top"><span class="fl-label">${label}</span>` +
            `<span class="fl-val">${val || 0}${i > 0 ? ` · 转化 <b>${pct}%</b>` : ''}</span></div>` +
            `<div class="fl-bar"><i style="width:${Math.round((val || 0) / fmax * 100)}%"></i></div></div>`).join('');

        // 学科
        const smax = Math.max(1, ...d.subjects.map(s => s.total));
        document.getElementById('anSubjects').innerHTML = d.subjects.length ? d.subjects.map(s =>
            `<div class="an-row"><span class="nm">${SUBJ_LABEL[s.subject] || esc(s.subject)}</span>` +
            `<span class="bar"><i style="width:${Math.round(s.total / smax * 100)}%"></i></span>` +
            `<span class="ct">${s.total} (登录 ${s.authed})</span></div>`).join('') : '<div class="empty">暂无</div>';

        // 登录转化
        const lg = d.login || {};
        const methods = (d.methods || []).map(m => `${m.method || '?'} ${m.c}`).join(' · ');
        document.getElementById('anLogin').innerHTML =
            `<div class="an-row"><span class="nm">登录</span><span class="ct" style="width:auto;flex:1;text-align:left;color:var(--text)">` +
            `提交 ${lg.login_submit || 0} · 成功 ${lg.login_success || 0} · 失败 ${lg.login_fail || 0}${methods ? '（' + methods + '）' : ''}</span></div>` +
            `<div class="an-row"><span class="nm">注册</span><span class="ct" style="width:auto;flex:1;text-align:left;color:var(--text)">` +
            `提交 ${lg.register_submit || 0} · 成功 ${lg.register_success || 0}</span></div>`;

        // 时段
        const byHour = {}; (d.hours || []).forEach(h => byHour[h.hour] = h.c);
        const hmax = Math.max(1, ...Object.values(byHour));
        let hb = '';
        for (let h = 0; h < 24; h++) {
            const c = byHour[h] || 0;
            hb += `<div class="hb" style="height:${Math.max(2, Math.round(c / hmax * 96))}px" title="${h}:00 · ${c}">${h % 3 === 0 ? `<b>${h}</b>` : ''}</div>`;
        }
        document.getElementById('anHours').innerHTML = `<div class="hour-bars">${hb}</div>`;

        // 每日活跃
        document.getElementById('anDaily').innerHTML =
            '<div class="an-table"><div class="r head"><span>日期</span><span>活跃设备</span><span>新增</span><span>回访</span></div>' +
            (d.daily.length ? d.daily.map(r =>
                `<div class="r"><span>${r.day}</span><span>${r.devices}</span>` +
                `<span class="new">+${r.new_devices}</span><span class="ret">${r.returning_devices}</span></div>`).join('')
                : '<div class="empty">暂无</div>') + '</div>';
    } catch (e) {
        document.getElementById('anFunnel').innerHTML = '<div class="empty">加载失败</div>';
    }
}

function emPreview() {
    const html = document.getElementById('emBody').value;
    if (!html.trim()) { alert('先填写邮件内容'); return; }
    const w = window.open('', '_blank');
    w.document.write(html.replaceAll('{{USERNAME}}', '预览用户').replaceAll('{{UNSUB_URL}}', '#'));
    w.document.close();
}

// 没写 {{UNSUB_URL}} 时自动追加合规退订页脚
function emEnsureUnsub(html) {
    if (html.includes('{{UNSUB_URL}}')) return html;
    return html + '\n<p style="text-align:center;color:#94908a;font-size:12px;margin-top:18px;">' +
        '不想再收到这类邮件? <a href="{{UNSUB_URL}}" style="color:#94908a;">一键退订</a></p>';
}

async function emSend(test) {
    const subject = document.getElementById('emSubject').value.trim();
    const html = document.getElementById('emBody').value.trim();
    const st = document.getElementById('emStatus');
    if (!subject || !html) { st.style.color = 'var(--bad)'; st.textContent = '主题和内容都不能为空'; return; }
    if (!test && !confirm('确认向所有可发送用户正式群发?发出后无法撤回。')) return;
    st.style.color = 'var(--dim)'; st.textContent = test ? '正在发送测试邮件...' : '正在群发,逐封发送中,请勿关闭页面...';
    try {
        const r = await fetch('/api/admin/email', {
            method: 'POST', headers,
            body: JSON.stringify({ subject, html: emEnsureUnsub(html), test: !!test }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || ('HTTP ' + r.status));
        st.style.color = 'var(--good)';
        st.textContent = `完成:成功 ${d.sent} 封,失败 ${d.failed} 封` +
            (d.failed ? ' — ' + d.results.filter(x => x.status === 'failed').map(x => `${x.email}(${x.error})`).join('; ') : '');
        loadEmail();
    } catch (e) {
        st.style.color = 'var(--bad)'; st.textContent = '发送失败: ' + e.message;
    }
}

if (userInfo.role === 'admin') {
