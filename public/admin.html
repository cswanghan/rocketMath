<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习乐园 · 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f1120; --card: #1a1d35; --border: #2a2d4a;
            --text: #e8eaf6; --dim: #8b8faf; --accent: #6366f1;
            --accent-hover: #5558e6; --good: #4ade80; --warn: #fbbf24; --bad: #f87171;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .top-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--card);
        }
        .top-bar h1 { font-size: 1.2rem; font-weight: 700; }
        .top-bar a { color: var(--dim); text-decoration: none; font-size: 0.85rem; }
        .top-bar a:hover { color: var(--accent); }
        .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
        .stat-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 14px;
            padding: 20px; text-align: center;
        }
        .stat-num { font-size: 2rem; font-weight: 800; color: var(--accent); }
        .stat-label { color: var(--dim); font-size: 0.8rem; margin-top: 4px; }

        .section { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 20px; }
        .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

        .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .search-input {
            flex: 1; min-width: 200px; padding: 8px 14px; border: 1px solid var(--border);
            border-radius: 10px; background: #141628; color: var(--text); font-size: 0.9rem; outline: none;
        }
        .search-input:focus { border-color: var(--accent); }
        .toolbar-btn {
            padding: 8px 16px; border: 1px solid var(--border); border-radius: 10px;
            background: var(--card); color: var(--text); cursor: pointer; font-size: 0.85rem; font-family: inherit;
        }
        .toolbar-btn:hover { border-color: var(--accent); color: var(--accent); }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; color: var(--dim); font-weight: 500; padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 10px 12px; border-bottom: 1px solid rgba(42,45,74,0.5); vertical-align: middle; }
        tr:hover td { background: rgba(99,102,241,0.04); }

        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 8px; font-size: 0.75rem; font-weight: 500;
        }
        .badge-admin { background: rgba(99,102,241,0.15); color: var(--accent); }
        .badge-user { background: rgba(139,143,175,0.15); color: var(--dim); }
        .badge-approved { background: rgba(74,222,128,0.15); color: var(--good); }
        .badge-pending { background: rgba(251,191,36,0.15); color: var(--warn); }
        .badge-rejected { background: rgba(248,113,113,0.15); color: var(--bad); }
        .badge-google { background: rgba(66,133,244,0.15); color: #4285f4; }

        .actions { display: flex; gap: 6px; flex-wrap: wrap; }
        .act-btn {
            padding: 3px 10px; border-radius: 8px; border: 1px solid var(--border);
            background: transparent; color: var(--dim); cursor: pointer; font-size: 0.75rem; font-family: inherit;
            transition: all 0.15s;
        }
        .act-btn:hover { border-color: var(--accent); color: var(--accent); }
        .act-btn.danger:hover { border-color: var(--bad); color: var(--bad); }
        .act-btn.success:hover { border-color: var(--good); color: var(--good); }

        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 16px; }
        .page-btn {
            padding: 6px 14px; border: 1px solid var(--border); border-radius: 8px;
            background: transparent; color: var(--dim); cursor: pointer; font-size: 0.82rem; font-family: inherit;
        }
        .page-btn:hover { border-color: var(--accent); color: var(--accent); }
        .page-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .empty { text-align: center; color: var(--dim); padding: 40px; }
        .loading { text-align: center; color: var(--dim); padding: 40px; }
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: var(--card); border: 1px solid var(--border); border-radius: 12px;
            padding: 10px 20px; font-size: 0.85rem; z-index: 999; display: none;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .toast.show { display: block; animation: fadeInUp 0.2s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

        @media (max-width: 640px) {
            .container { padding: 16px; }
            table { font-size: 0.78rem; }
            td, th { padding: 8px 6px; }
            .col-email, .col-phone { display: none; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <h1>&#x2699;&#xFE0F; 管理后台</h1>
        <div>
            <span id="adminName" style="color:var(--dim);font-size:0.85rem;margin-right:12px;"></span>
            <a href="/">&#x2190; 返回首页</a>
        </div>
    </div>
    <div class="container">
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><div class="stat-num" id="statTotal">-</div><div class="stat-label">总用户</div></div>
            <div class="stat-card"><div class="stat-num" id="statToday">-</div><div class="stat-label">今日新增</div></div>
            <div class="stat-card"><div class="stat-num" id="statWeek">-</div><div class="stat-label">本周新增</div></div>
            <div class="stat-card"><div class="stat-num" id="statGoogle">-</div><div class="stat-label">Google 用户</div></div>
        </div>

        <div class="section">
            <div class="section-title">&#x1F465; 用户列表</div>
            <div class="toolbar">
                <input class="search-input" id="searchInput" placeholder="搜索用户名或邮箱..." onkeydown="if(event.key==='Enter')searchUsers()">
                <button class="toolbar-btn" onclick="searchUsers()">搜索</button>
                <button class="toolbar-btn" onclick="loadUsers(1,'')">重置</button>
            </div>
            <div id="userTable"><div class="loading">加载中...</div></div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>
    <div class="toast" id="toast"></div>

<script>
const token = localStorage.getItem('token');
if (!token) { window.location.href = '/login.html?redirect=/admin.html'; }

const userInfo = JSON.parse(localStorage.getItem('user') || '{}');
if (userInfo.role !== 'admin') {
    document.querySelector('.container').innerHTML = '<div class="empty" style="margin-top:80px;">&#x1F6AB; 仅管理员可访问</div>';
}
document.getElementById('adminName').textContent = userInfo.username || '';

const headers = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
let currentPage = 1;
let currentSearch = '';

async function loadStats() {
    try {
        const r = await fetch('/api/admin/stats', { headers });
        if (!r.ok) throw new Error();
        const d = await r.json();
        document.getElementById('statTotal').textContent = d.total;
        document.getElementById('statToday').textContent = d.today;
        document.getElementById('statWeek').textContent = d.week;
        document.getElementById('statGoogle').textContent = d.google;
    } catch {}
}

async function loadUsers(page, search) {
    currentPage = page;
    currentSearch = search;
    const params = new URLSearchParams({ page: String(page), size: '20' });
    if (search) params.set('q', search);

    try {
        const r = await fetch('/api/admin/users?' + params, { headers });
        if (!r.ok) throw new Error();
        const d = await r.json();
        renderTable(d.users);
        renderPagination(d.page, d.pages);
    } catch {
        document.getElementById('userTable').innerHTML = '<div class="empty">加载失败</div>';
    }
}

function renderTable(users) {
    if (!users.length) {
        document.getElementById('userTable').innerHTML = '<div class="empty">暂无用户</div>';
        return;
    }
    let html = `<table>
        <thead><tr>
            <th>ID</th><th>用户名</th><th class="col-email">邮箱</th>
            <th>角色</th><th>状态</th><th>登录方式</th><th>注册时间</th><th>操作</th>
        </tr></thead><tbody>`;

    for (const u of users) {
        const roleBadge = u.role === 'admin'
            ? '<span class="badge badge-admin">管理员</span>'
            : '<span class="badge badge-user">用户</span>';
        const statusBadge = u.status === 'approved'
            ? '<span class="badge badge-approved">正常</span>'
            : u.status === 'pending'
            ? '<span class="badge badge-pending">待审</span>'
            : '<span class="badge badge-rejected">拒绝</span>';
        const authType = u.google_sub
            ? '<span class="badge badge-google">Google</span>'
            : '<span class="badge badge-user">密码</span>';
        const time = u.created_at ? u.created_at.replace('T', ' ').slice(0, 16) : '-';

        let actions = '<div class="actions">';
        if (u.role !== 'admin') {
            actions += `<button class="act-btn success" onclick="doAction('promote',${u.id})">设管理员</button>`;
        } else {
            actions += `<button class="act-btn" onclick="doAction('demote',${u.id})">取消管理员</button>`;
        }
        if (u.status !== 'approved') {
            actions += `<button class="act-btn success" onclick="doAction('approve',${u.id})">通过</button>`;
        }
        if (u.status !== 'rejected') {
            actions += `<button class="act-btn danger" onclick="doAction('reject',${u.id})">禁用</button>`;
        }
        actions += `<button class="act-btn danger" onclick="if(confirm('确定删除用户 ${u.username}？'))doAction('delete',${u.id})">删除</button>`;
        actions += '</div>';

        html += `<tr>
            <td>${u.id}</td>
            <td><strong>${esc(u.username)}</strong></td>
            <td class="col-email">${esc(u.email || '-')}</td>
            <td>${roleBadge}</td>
            <td>${statusBadge}</td>
            <td>${authType}</td>
            <td style="color:var(--dim)">${time}</td>
            <td>${actions}</td>
        </tr>`;
    }
    html += '</tbody></table>';
    document.getElementById('userTable').innerHTML = html;
}

function renderPagination(page, pages) {
    if (pages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
    let html = '';
    html += `<button class="page-btn" onclick="loadUsers(${page - 1},'${currentSearch}')" ${page <= 1 ? 'disabled' : ''}>&#x2190;</button>`;
    for (let i = 1; i <= pages; i++) {
        if (pages > 7 && i > 3 && i < pages - 2 && Math.abs(i - page) > 1) {
            if (i === 4 || i === pages - 3) html += '<span style="color:var(--dim);padding:0 4px">...</span>';
            continue;
        }
        html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="loadUsers(${i},'${currentSearch}')">${i}</button>`;
    }
    html += `<button class="page-btn" onclick="loadUsers(${page + 1},'${currentSearch}')" ${page >= pages ? 'disabled' : ''}>&#x2192;</button>`;
    document.getElementById('pagination').innerHTML = html;
}

async function doAction(action, userId) {
    try {
        const r = await fetch('/api/admin/user-action', {
            method: 'POST', headers,
            body: JSON.stringify({ action, userId }),
        });
        const d = await r.json();
        if (r.ok) {
            showToast(d.message || '操作成功');
            loadUsers(currentPage, currentSearch);
            loadStats();
        } else {
            showToast(d.error || '操作失败');
        }
    } catch {
        showToast('网络错误');
    }
}

function searchUsers() {
    const q = document.getElementById('searchInput').value.trim();
    loadUsers(1, q);
}

function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
}

function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

if (userInfo.role === 'admin') {
    loadStats();
    loadUsers(1, '');
}
</script>
</body>
</html>
