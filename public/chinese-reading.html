<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>阅读识字</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5.0/dist/hanzi-writer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cnchar/cnchar.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cnchar-poly/cnchar.poly.min.js"></script>
<style>
:root {
  --paper: #f4ead6;
  --paper-2: #fbf5e7;
  --paper-3: #fdf9ef;
  --ink: #34302a;
  --ink-soft: #7a7062;
  --ink-faint: #a99e8c;
  --red: #bf3f2b;
  --red-soft: #e7b9ac;
  --red-wash: #f3d9cf;
  --gold: #c6962f;
  --gold-wash: #fdf0d5;
  --green: #4a8c5c;
  --green-wash: #e2f0e5;
  --line: #e3d6bd;
  --shadow: rgba(80, 55, 30, .16);
  --highlight: rgba(198, 150, 47, .25);
  --highlight-active: rgba(198, 150, 47, .50);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
body {
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  color: var(--ink);
  background-color: var(--paper);
  background-image:
    radial-gradient(circle at 20% 15%, rgba(255,255,255,.5), transparent 40%),
    radial-gradient(circle at 80% 85%, rgba(198,150,47,.10), transparent 45%);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.kai { font-family: "Kaiti SC", "STKaiti", "Kaiti", "楷体", serif; }
.pinyin-font { font-family: "Baloo 2", sans-serif; }

/* ===== Header ===== */
header {
  text-align: center;
  padding: 22px 16px 8px;
}
.logo {
  display: inline-flex; align-items: center; gap: 12px;
}
.logo .seal {
  width: 50px; height: 50px; flex: none;
  background: var(--gold);
  border-radius: 10px;
  display: grid; place-items: center;
  color: #fff; font-size: 28px; line-height: 1;
  font-family: "Kaiti SC", "STKaiti", "Kaiti", "楷体", serif; font-weight: 700;
  box-shadow: 2px 3px 0 rgba(120, 90, 25, .45);
  transform: rotate(-3deg);
}
.logo h1 {
  font-family: "Kaiti SC", "STKaiti", "Kaiti", "楷体", serif;
  font-size: 32px; margin: 0; letter-spacing: 4px; font-weight: 700;
}

/* ===== Grade tabs ===== */
.grade-bar {
  display: flex; gap: 4px; justify-content: center; flex-wrap: wrap;
  margin: 18px auto 6px; padding: 5px;
  background: var(--paper-3); border: 1px solid var(--line);
  border-radius: 14px; width: max-content; max-width: calc(100% - 32px);
  box-shadow: 0 2px 8px var(--shadow);
}
.grade-btn {
  border: none; background: transparent; cursor: pointer;
  font-family: inherit; font-size: 14px; color: var(--ink-soft);
  padding: 8px 16px; border-radius: 10px; font-weight: 600; transition: .18s;
}
.grade-btn:hover { background: rgba(198,150,47,.12); }
.grade-btn.active {
  background: var(--gold); color: #fff;
  box-shadow: 0 2px 8px rgba(198,150,47,.35);
}

/* ===== Mode: scope toggle ===== */
.scope-bar {
  display: flex; gap: 6px; justify-content: center; margin: 10px auto 16px;
}
.scope-btn {
  border: 1px solid var(--line); background: var(--paper-3); cursor: pointer;
  font-family: inherit; font-size: 13px; color: var(--ink-soft);
  padding: 6px 14px; border-radius: 8px; font-weight: 500; transition: .18s;
}
.scope-btn.active {
  background: var(--gold-wash); color: var(--gold);
  border-color: var(--gold); font-weight: 600;
}

/* ===== Input view ===== */
.input-view {
  max-width: 680px; margin: 0 auto; padding: 0 16px 40px;
}
.input-box {
  background: var(--paper-3); border: 2px solid var(--line);
  border-radius: 16px; padding: 4px; margin-bottom: 16px;
  box-shadow: 0 2px 12px var(--shadow);
}
.input-box textarea {
  width: 100%; min-height: 200px; border: none; background: transparent;
  font-family: "Kaiti SC", "STKaiti", "Kaiti", "楷体", serif;
  font-size: 18px; line-height: 2; color: var(--ink);
  padding: 16px; resize: vertical; outline: none;
}
.input-box textarea::placeholder { color: var(--ink-faint); }
.input-actions {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; border-top: 1px solid var(--line);
}
.char-count { font-size: 13px; color: var(--ink-faint); }
.start-btn {
  border: none; cursor: pointer;
  background: var(--gold); color: #fff;
  font-family: inherit; font-size: 16px; font-weight: 700;
  padding: 12px 36px; border-radius: 12px;
  box-shadow: 0 3px 12px rgba(198,150,47,.35);
  transition: transform .12s;
}
.start-btn:active { transform: scale(.96); }
.start-btn:disabled { opacity: .4; cursor: default; }
.hint-text {
  text-align: center; color: var(--ink-faint); font-size: 13px;
  margin-top: 12px;
}

/* ===== Reading view ===== */
.reading-view {
  display: none; max-width: 960px; margin: 0 auto; padding: 0 16px 40px;
}
.reading-view.active { display: block; }
.toolbar {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px; flex-wrap: wrap;
}
.back-to-input {
  border: 1px solid var(--line); background: var(--paper-3);
  cursor: pointer; font-family: inherit; font-size: 13px;
  color: var(--ink-soft); padding: 7px 14px; border-radius: 8px;
}
.stats {
  font-size: 13px; color: var(--ink-soft); margin-left: auto;
}
.stats b { color: var(--gold); font-weight: 700; }

.reading-layout {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 20px;
  align-items: start;
}
@media (max-width: 760px) {
  .reading-layout { grid-template-columns: 1fr; }
}

/* article panel */
.article-panel {
  background: var(--paper-3); border: 1px solid var(--line);
  border-radius: 16px; padding: 28px 24px;
  box-shadow: 0 2px 12px var(--shadow);
  line-height: 2.4;
}
.article-panel .article-body {
  font-family: "Kaiti SC", "STKaiti", "Kaiti", "楷体", serif;
  font-size: 22px; letter-spacing: 1px;
}
.article-body .hw {
  background: var(--highlight);
  border-radius: 4px; padding: 1px 2px;
  cursor: pointer; transition: background .15s;
  position: relative;
}
.article-body .hw:hover,
.article-body .hw.active {
  background: var(--highlight-active);
}
.article-body .hw.mastered {
  background: var(--green-wash);
  color: var(--green);
}
/* pinyin ruby above highlighted chars */
.article-body .hw rt {
  font-family: "Baloo 2", sans-serif;
  font-size: 11px; color: var(--gold);
  font-weight: 600;
}

/* detail panel (sidebar) */
.detail-panel {
  background: var(--paper-3); border: 1px solid var(--line);
  border-radius: 16px; padding: 24px;
  box-shadow: 0 2px 12px var(--shadow);
  position: sticky; top: 16px;
  min-height: 200px;
}
.detail-empty {
  text-align: center; color: var(--ink-faint);
  padding: 40px 0; font-size: 14px;
}
.detail-char {
  text-align: center;
  font-family: "Kaiti SC", "STKaiti", "Kaiti", "楷体", serif;
  font-size: 72px; font-weight: 700;
  margin: 0 0 4px;
}
.detail-pinyin {
  text-align: center;
  font-family: "Baloo 2", sans-serif;
  font-size: 28px; color: var(--gold); font-weight: 600;
  margin-bottom: 12px;
}
.writer-box {
  width: 160px; height: 160px; margin: 0 auto 16px;
  background: var(--paper-2);
  border: 2px dashed var(--red-soft);
  border-radius: 12px;
  position: relative;
}
.detail-actions {
  display: flex; gap: 8px; justify-content: center; margin-bottom: 16px;
}
.detail-btn {
  border: 1px solid var(--line); background: var(--paper-2);
  cursor: pointer; font-family: inherit; font-size: 13px;
  color: var(--ink-soft); padding: 7px 14px; border-radius: 8px;
  font-weight: 500; transition: .15s;
}
.detail-btn:hover { background: var(--paper); }
.detail-btn.mastered-btn {
  background: var(--green-wash); color: var(--green);
  border-color: var(--green);
}
.detail-section {
  margin-top: 14px; padding-top: 12px;
  border-top: 1px solid var(--line);
}
.detail-section-title {
  font-size: 12px; color: var(--ink-faint); font-weight: 600;
  margin-bottom: 6px; letter-spacing: 2px;
}
.detail-section-body {
  font-size: 15px; color: var(--ink); line-height: 1.7;
}
.detail-section-body .example-word {
  display: inline-block;
  background: var(--paper); border: 1px solid var(--line);
  padding: 3px 10px; border-radius: 6px; margin: 3px 4px 3px 0;
  font-size: 16px;
}

/* word list summary */
.word-list-panel {
  margin-top: 20px;
  background: var(--paper-3); border: 1px solid var(--line);
  border-radius: 16px; padding: 20px 24px;
  box-shadow: 0 2px 12px var(--shadow);
}
.word-list-title {
  font-weight: 700; font-size: 15px; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.word-chips {
  display: flex; flex-wrap: wrap; gap: 8px;
}
.word-chip {
  display: flex; flex-direction: column; align-items: center;
  background: var(--paper-2); border: 1px solid var(--line);
  border-radius: 10px; padding: 8px 6px; min-width: 52px;
  cursor: pointer; transition: .15s;
}
.word-chip:hover { border-color: var(--gold); }
.word-chip.mastered {
  background: var(--green-wash); border-color: var(--green);
}
.word-chip .wc-char {
  font-family: "Kaiti SC", "STKaiti", "Kaiti", "楷体", serif;
  font-size: 22px; font-weight: 700;
}
.word-chip .wc-py {
  font-family: "Baloo 2", sans-serif;
  font-size: 11px; color: var(--gold);
}
.word-chip .wc-count {
  font-size: 10px; color: var(--ink-faint);
}

/* mobile detail overlay */
.detail-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(52, 48, 42, .5);
  z-index: 200;
}
.detail-overlay.active { display: flex; align-items: flex-end; }
.detail-overlay .detail-sheet {
  width: 100%; max-height: 75vh; overflow-y: auto;
  background: var(--paper-3);
  border-radius: 20px 20px 0 0;
  padding: 24px 20px max(20px, env(safe-area-inset-bottom));
  animation: sheetUp .25s ease;
}
@keyframes sheetUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.detail-overlay .sheet-handle {
  width: 36px; height: 4px; background: var(--line);
  border-radius: 2px; margin: 0 auto 16px;
}
@media (max-width: 760px) {
  .detail-panel { display: none; }
  .detail-overlay.has-char { display: flex; }
}
@media (min-width: 761px) {
  .detail-overlay { display: none !important; }
}

/* responsive */
@media (max-width: 560px) {
  .article-panel { padding: 18px 14px; }
  .article-body { font-size: 19px !important; }
  .grade-btn { padding: 6px 10px; font-size: 13px; }
  .logo h1 { font-size: 26px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="seal kai">读</div>
    <h1 class="kai">阅读识字</h1>
  </div>
</header>

<!-- Grade selector -->
<div class="grade-bar" id="gradeBar"></div>
<div class="scope-bar">
  <button class="scope-btn active" data-scope="current" onclick="setScope('current')">仅本年级生字</button>
  <button class="scope-btn" data-scope="cumulative" onclick="setScope('cumulative')">含低年级生字</button>
</div>

<!-- Input view -->
<div class="input-view" id="inputView">
  <div class="input-box">
    <textarea id="articleInput" placeholder="在这里粘贴一段文章或课文...&#10;&#10;系统会自动识别其中需要学习的生字，&#10;让你在阅读中学习！"></textarea>
    <div class="input-actions">
      <span class="char-count" id="charCount">0 字</span>
      <button class="start-btn" id="startBtn" disabled onclick="startReading()">开始阅读</button>
    </div>
  </div>
  <p class="hint-text">支持粘贴任意中文文章、课文、故事、新闻等</p>
</div>

<!-- Reading view -->
<div class="reading-view" id="readingView">
  <div class="toolbar">
    <button class="back-to-input" onclick="backToInput()">← 换一篇</button>
    <div class="stats" id="stats"></div>
  </div>
  <div class="reading-layout">
    <div>
      <div class="article-panel">
        <div class="article-body" id="articleBody"></div>
      </div>
      <div class="word-list-panel">
        <div class="word-list-title">📋 本文生字表 <span id="wordListCount"></span></div>
        <div class="word-chips" id="wordChips"></div>
      </div>
    </div>
    <div class="detail-panel" id="detailPanel">
      <div class="detail-empty" id="detailEmpty">👈 点击文中高亮的字<br>查看详情</div>
      <div id="detailContent" style="display:none"></div>
    </div>
  </div>
</div>

<!-- Mobile detail overlay -->
<div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeOverlay()">
  <div class="detail-sheet">
    <div class="sheet-handle"></div>
    <div id="detailContentMobile"></div>
  </div>
</div>

<script>
// ========== Grade-level character data (人教版) ==========

// Common words/meanings per character (curated for learning)
const CHAR_INFO = {};

// ========== State ==========
let currentGrade = 3;
let scope = 'current'; // 'current' | 'cumulative'
let articleText = '';
let foundChars = [];   // [{char, pinyin, count}]
let masteredSet = new Set();
let currentDetailChar = null;
let writerInstance = null;

// ========== Init ==========
document.addEventListener('DOMContentLoaded', () => {
  renderGradeBar();
  const input = document.getElementById('articleInput');
  input.addEventListener('input', () => {
    const len = input.value.replace(/\s/g, '').length;
    document.getElementById('charCount').textContent = len + ' 字';
    document.getElementById('startBtn').disabled = len === 0;
  });
  // load mastered from localStorage
  try {
    const saved = localStorage.getItem('reading-mastered');
    if (saved) masteredSet = new Set(JSON.parse(saved));
  } catch(e) {}
});

function renderGradeBar() {
  const bar = document.getElementById('gradeBar');
  bar.innerHTML = '';
  for (let g = 1; g <= 6; g++) {
    const btn = document.createElement('button');
    btn.className = 'grade-btn' + (g === currentGrade ? ' active' : '');
    btn.textContent = g + '年级';
    btn.onclick = () => { currentGrade = g; renderGradeBar(); };
    bar.appendChild(btn);
  }
}

function setScope(s) {
  scope = s;
  document.querySelectorAll('.scope-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.scope === s);
  });
}

// ========== Core logic ==========
function getTargetChars() {
  if (scope === 'current') {
    return new Set(GRADE_CHARS[currentGrade] || '');
  }
  let chars = '';
  for (let g = 1; g <= currentGrade; g++) {
    chars += GRADE_CHARS[g] || '';
  }
  return new Set(chars);
}

function getPinyin(ch) {
  try {
    if (window.cnchar) {
      const py = cnchar.spell(ch, 'tone', 'poly');
      if (py && py !== ch) return py.toLowerCase();
    }
  } catch(e) {}
  return '';
}

function startReading() {
  const input = document.getElementById('articleInput');
  articleText = input.value.trim();
  if (!articleText) return;

  const targetSet = getTargetChars();
  const charMap = new Map(); // char -> count

  for (const ch of articleText) {
    if (targetSet.has(ch)) {
      charMap.set(ch, (charMap.get(ch) || 0) + 1);
    }
  }

  foundChars = Array.from(charMap.entries())
    .map(([char, count]) => ({ char, pinyin: getPinyin(char), count }))
    .sort((a, b) => b.count - a.count);

  renderReadingView();
}

function renderReadingView() {
  document.getElementById('inputView').style.display = 'none';
  document.getElementById('readingView').classList.add('active');

  const targetSet = getTargetChars();
  const foundSet = new Set(foundChars.map(f => f.char));

  // Stats
  const totalChars = articleText.replace(/\s/g, '').length;
  const masteredCount = foundChars.filter(f => masteredSet.has(f.char)).length;
  document.getElementById('stats').innerHTML =
    `全文 <b>${totalChars}</b> 字，含 <b>${foundChars.length}</b> 个${currentGrade}年级生字` +
    (masteredCount > 0 ? `，已掌握 <b>${masteredCount}</b> 个` : '');

  // Render article body with highlighted chars
  const body = document.getElementById('articleBody');
  body.innerHTML = '';
  for (const ch of articleText) {
    if (ch === '\n') {
      body.appendChild(document.createElement('br'));
      continue;
    }
    if (foundSet.has(ch)) {
      const ruby = document.createElement('ruby');
      ruby.className = 'hw' + (masteredSet.has(ch) ? ' mastered' : '');
      ruby.textContent = ch;
      ruby.dataset.char = ch;
      const rt = document.createElement('rt');
      const info = foundChars.find(f => f.char === ch);
      rt.textContent = info ? info.pinyin : '';
      ruby.appendChild(rt);
      ruby.onclick = () => showDetail(ch);
      body.appendChild(ruby);
    } else {
      body.appendChild(document.createTextNode(ch));
    }
  }

  // Word chips
  renderWordChips();

  // Reset detail
  showDetailEmpty();
}

function renderWordChips() {
  const container = document.getElementById('wordChips');
  container.innerHTML = '';
  document.getElementById('wordListCount').textContent = `(${foundChars.length}个)`;
  for (const f of foundChars) {
    const chip = document.createElement('div');
    chip.className = 'word-chip' + (masteredSet.has(f.char) ? ' mastered' : '');
    chip.innerHTML =
      `<span class="wc-char">${f.char}</span>` +
      `<span class="wc-py">${f.pinyin}</span>` +
      `<span class="wc-count">×${f.count}</span>`;
    chip.onclick = () => showDetail(f.char);
    container.appendChild(chip);
  }
}

// ========== Detail panel ==========
function showDetailEmpty() {
  document.getElementById('detailEmpty').style.display = '';
  document.getElementById('detailContent').style.display = 'none';
  currentDetailChar = null;
}

function showDetail(ch) {
  currentDetailChar = ch;
  const info = foundChars.find(f => f.char === ch);
  if (!info) return;

  // highlight active
  document.querySelectorAll('.hw').forEach(el => {
    el.classList.toggle('active', el.dataset.char === ch);
  });

  const isMastered = masteredSet.has(ch);
  const detailHTML = `
    <div class="detail-char">${ch}</div>
    <div class="detail-pinyin pinyin-font">${info.pinyin || '—'}</div>
    <div class="writer-box" id="__WRITER_ID__"></div>
    <div class="detail-actions">
      <button class="detail-btn" onclick="playAnimation()">▶ 笔顺</button>
      <button class="detail-btn" onclick="quizStroke()">✏️ 临摹</button>
      <button class="detail-btn ${isMastered ? 'mastered-btn' : ''}"
        onclick="toggleMastered('${ch}')">
        ${isMastered ? '✅ 已掌握' : '标记掌握'}
      </button>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">出 现</div>
      <div class="detail-section-body">
        本文出现 <b>${info.count}</b> 次
      </div>
    </div>
  `;

  // Desktop panel
  const panel = document.getElementById('detailContent');
  const empty = document.getElementById('detailEmpty');
  empty.style.display = 'none';
  panel.style.display = '';
  panel.innerHTML = detailHTML.replace('__WRITER_ID__', 'writerDesktop');
  initWriter('writerDesktop', ch);

  // Mobile overlay
  const overlay = document.getElementById('detailOverlay');
  const mobile = document.getElementById('detailContentMobile');
  mobile.innerHTML = detailHTML.replace('__WRITER_ID__', 'writerMobile');
  overlay.classList.add('has-char');
  // only init mobile writer if actually visible
  if (window.innerWidth <= 760) {
    initWriter('writerMobile', ch);
  }
}

function initWriter(containerId, ch) {
  // destroy previous
  if (writerInstance) {
    try { writerInstance.target && writerInstance.target.innerHTML && (writerInstance = null); } catch(e) {}
  }
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = '';
  try {
    writerInstance = HanziWriter.create(containerId, ch, {
      width: 150, height: 150,
      padding: 8,
      strokeColor: '#34302a',
      radicalColor: '#bf3f2b',
      strokeAnimationSpeed: 1,
      delayBetweenStrokes: 300,
      showOutline: true,
      showCharacter: true,
      charDataLoader: function(c, onComplete) {
        fetch('https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/' + encodeURIComponent(c) + '.json')
          .then(function(r) { return r.json(); })
          .then(onComplete)
          .catch(function() {
            el.innerHTML = '<div style="text-align:center;padding:40px;color:#a99e8c">暂无笔顺数据</div>';
          });
      }
    });
  } catch(e) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:#a99e8c">暂无笔顺数据</div>';
  }
}

function playAnimation() {
  if (writerInstance) {
    writerInstance.animateCharacter();
  }
}

function quizStroke() {
  if (writerInstance) {
    writerInstance.quiz({
      showHintAfterMisses: 2,
      onComplete: () => {}
    });
  }
}

function toggleMastered(ch) {
  if (masteredSet.has(ch)) {
    masteredSet.delete(ch);
  } else {
    masteredSet.add(ch);
  }
  // persist
  try {
    localStorage.setItem('reading-mastered', JSON.stringify([...masteredSet]));
  } catch(e) {}
  // re-render
  renderReadingView();
  if (currentDetailChar === ch) {
    showDetail(ch);
  }
}

function closeOverlay() {
  document.getElementById('detailOverlay').classList.remove('has-char');
}

function backToInput() {
  document.getElementById('readingView').classList.remove('active');
  document.getElementById('inputView').style.display = '';
  showDetailEmpty();
  currentDetailChar = null;
}
</script>
</body>
</html>
