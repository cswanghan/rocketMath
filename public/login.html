<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星芽 · 登录</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <script src="/track.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #fcfbf9; --card: #ffffff; --border: #e7e4dd;
            --text: #1d1b18; --text-dim: #94908a; --accent: #2f9be0;
            --accent-hover: #1f86c9; --input-bg: #fbfaf7; --success: #2bb24c; --error: #f0564a;
            --ink: #1c1a17; --hand: 'ZCOOL KuaiLe','PingFang SC','Microsoft YaHei',sans-serif;
        }
        body {
            font-family: system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(900px 600px at 18% -12%, #eef7fd 0%, transparent 60%),
                              radial-gradient(900px 600px at 92% 4%, #fdf0e3 0%, transparent 58%),
                              linear-gradient(180deg,#fff 0%, #faf8f4 70%, #f3efe7 100%);
            background-attachment: fixed;
            min-height: 100vh; color: var(--text);
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .auth-container { width: 100%; max-width: 400px; }
        .auth-header { text-align: center; margin-bottom: 36px; }
        .auth-header .icon { font-size: 3rem; margin-bottom: 6px; }
        .auth-header h1 { font-family: var(--hand); font-size: 2.6rem; font-weight: 400; margin-bottom: 4px; letter-spacing: 1px; }
        .auth-header .sub { color: var(--text-dim); font-size: 0.85rem; }

        .auth-card {
            background: var(--card); border: none; border-radius: 24px;
            padding: 32px 28px; position: relative;
            box-shadow: 0 18px 46px rgba(40,38,60,.12), 0 4px 12px rgba(40,38,60,.06);
        }
        .auth-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px;
            background: linear-gradient(90deg, #2f9be0, #2bb24c 45%, #f3960a); border-radius: 24px 24px 0 0;
        }

        .tabs {
            display: flex; border-bottom: 1px solid var(--border); margin: -32px -28px 24px;
            padding: 0 28px;
        }
        .tab {
            flex: 1; text-align: center; padding: 14px 0; font-size: 0.9rem;
            color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

        .form-group { margin-bottom: 18px; }
        .form-label {
            display: block; font-size: 0.8rem; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
        }
        .form-input {
            width: 100%; padding: 13px 15px; border: 1.5px solid var(--border); border-radius: 12px;
            font-size: 0.98rem; font-family: inherit; color: var(--text);
            background: var(--input-bg); transition: border-color 0.2s; outline: none;
        }
        .form-input:focus { border-color: var(--accent); }
        .form-input::placeholder { color: #b8b4ab; }

        .submit-btn {
            width: 100%; padding: 15px; border: none; border-radius: 999px;
            background: linear-gradient(135deg, #3ccb63 0%, #28a847 100%); color: white; font-size: 1.05rem;
            font-family: inherit; font-weight: 700; cursor: pointer; transition: transform .14s, box-shadow .14s, filter .14s;
            margin-top: 6px; box-shadow: 0 8px 22px rgba(43,178,76,.30);
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 30px rgba(43,178,76,.38); filter: brightness(1.04); }
        .submit-btn:active { transform: scale(.98); }
        .submit-btn:disabled { background: #c9c5bd; cursor: not-allowed; box-shadow: none; transform: none; }

        .message {
            margin-top: 14px; padding: 10px 14px; border-radius: 8px;
            font-size: 0.85rem; display: none;
        }
        .message.show { display: block; }
        .message.error { background: #fdecea; color: var(--error); }
        .message.success { background: #e6f7ec; color: var(--success); }

        .auth-footer { text-align: center; margin-top: 20px; }
        .auth-footer a {
            color: var(--text-dim); text-decoration: none; font-size: 0.88rem;
            padding: 8px 18px; border: none; background: #fff; border-radius: 999px;
            box-shadow: 0 4px 12px rgba(40,38,60,.07); transition: all 0.2s;
        }
        .auth-footer a:hover { color: var(--accent); }

        #loginForm, #registerForm { display: none; }
        #loginForm.active, #registerForm.active { display: block; }

        .divider {
            display: flex; align-items: center; margin: 20px 0 16px; color: var(--text-dim);
            font-size: 0.78rem; letter-spacing: 1px;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }
        .divider span { padding: 0 12px; }
        .google-btn-wrap { display: flex; justify-content: center; }

        .user-bar {
            display: none; position: fixed; top: 0; right: 0; padding: 12px 20px;
            z-index: 100; font-size: 0.85rem; color: var(--text-dim);
        }
        .user-bar.show { display: flex; align-items: center; gap: 12px; }
        .user-bar .username { color: var(--text); font-weight: 500; }
        .user-bar .logout-btn {
            background: #fff; border: 1px solid var(--border); border-radius: 12px;
            color: var(--text-dim); padding: 4px 12px; cursor: pointer; font-size: 0.8rem;
            box-shadow: 0 4px 12px rgba(40,38,60,.07);
        }
        .user-bar .logout-btn:hover { color: var(--error); border-color: var(--error); }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="auth-header">
        <div class="icon">&#x1F331;</div>
        <h1>星芽</h1>
        <p class="sub">登录或注册开始学习</p>
    </div>

    <div class="auth-card">
        <div class="tabs">
            <div class="tab active" onclick="showTab('login')">登录</div>
            <div class="tab" onclick="showTab('register')">注册</div>
        </div>

        <form id="loginForm" class="active" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input class="form-input" name="username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input class="form-input" name="password" type="password" placeholder="请输入密码" required>
            </div>
            <button class="submit-btn" type="submit">登录</button>
            <div class="message" id="loginMsg"></div>

            <div class="divider"><span>或</span></div>
            <div class="google-btn-wrap" id="googleBtnWrap"></div>
            <div class="message" id="googleMsg"></div>
        </form>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input class="form-input" name="username" placeholder="3-20 字符" required>
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input class="form-input" name="password" type="password" placeholder="至少 6 位" required>
            </div>
            <div class="form-group">
                <label class="form-label">邮箱</label>
                <input class="form-input" name="email" type="email" placeholder="用于找回密码" required>
            </div>
            <div class="form-group">
                <label class="form-label">手机号（选填）</label>
                <input class="form-input" name="phone" placeholder="选填">
            </div>
            <button class="submit-btn" type="submit">注册</button>
            <div class="message" id="registerMsg"></div>
        </form>
    </div>

    <div class="auth-footer">
        <a href="/">← 返回首页</a>
    </div>
</div>

<script>
    const _redirect = new URLSearchParams(location.search).get('redirect') || '/';
    function getRedirect() {
        if (_redirect.startsWith('/')) return _redirect;
        return '/';
    }

    const forceLogin = new URLSearchParams(location.search).get('force');
    if (forceLogin) {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
    } else {
        const token = localStorage.getItem('token');
        if (token) {
            fetch('/api/auth/me', { headers: { 'Authorization': `Bearer ${token}` } })
                .then(r => {
                    if (r.ok) {
                        window.location.href = getRedirect();
                    } else {
                        localStorage.removeItem('token');
                        localStorage.removeItem('user');
                    }
                })
                .catch(() => {});
        }
    }

    // Google redirect 流程: 普通加载时记下登录后要去的地址 (因为跳转后会丢失 ?redirect)
    (function () {
        if (!new URLSearchParams(location.search).get('gcode')) {
            try { localStorage.setItem('rm.gredirect', getRedirect()); } catch (e) {}
        }
    })();

    // 处理 Google redirect 回来 (?gcode= / ?gerror=)
    (async function () {
        const params = new URLSearchParams(location.search);
        const gerror = params.get('gerror');
        const gcode = params.get('gcode');
        if (gerror) {
            showMsg('googleMsg', decodeURIComponent(gerror), 'error');
            history.replaceState({}, '', '/login.html');
            return;
        }
        if (!gcode) return;
        try {
            const r = await fetch('/api/auth/google-exchange', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: gcode }),
            });
            const res = await r.json();
            if (!r.ok) {
                showMsg('googleMsg', res.error || '登录失败', 'error');
                history.replaceState({}, '', '/login.html');
                return;
            }
            localStorage.setItem('token', res.token);
            localStorage.setItem('user', JSON.stringify(res.user));
            window.rmTrack && rmTrack('login_success', { method: 'google', needsUsername: !!res.needsUsername });
            window.rmFlush && rmFlush(true);
            const dest = localStorage.getItem('rm.gredirect') || '/';
            window.location.href = res.needsUsername
                ? '/complete-username.html?redirect=' + encodeURIComponent(dest)
                : dest;
        } catch (e) {
            showMsg('googleMsg', '网络错误，请重试', 'error');
            history.replaceState({}, '', '/login.html');
        }
    })();

    function showTab(tab) {
        document.querySelectorAll('.tab').forEach((t, i) =>
            t.classList.toggle('active', (tab === 'login' ? i === 0 : i === 1)));
        document.getElementById('loginForm').classList.toggle('active', tab === 'login');
        document.getElementById('registerForm').classList.toggle('active', tab === 'register');
    }

    function showMsg(id, text, type) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = `message show ${type}`;
    }

    async function handleLogin(e) {
        e.preventDefault();
        const form = e.target;
        const data = { username: form.username.value, password: form.password.value };
        window.rmTrack && rmTrack('login_submit', { method: 'password' });

        try {
            const r = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data),
            });
            const res = await r.json();

            if (r.ok) {
                localStorage.setItem('token', res.token);
                localStorage.setItem('user', JSON.stringify(res.user));
                window.rmTrack && rmTrack('login_success', { method: 'password' });
                window.rmFlush && rmFlush(true);
                window.location.href = getRedirect();
            } else {
                window.rmTrack && rmTrack('login_fail', { method: 'password', error: res.error });
                showMsg('loginMsg', res.error, 'error');
            }
        } catch (err) {
            showMsg('loginMsg', '网络错误: ' + err.message, 'error');
        }
    }

    async function initGoogleSignIn() {
        try {
            const r = await fetch('/api/auth/google-config');
            const cfg = await r.json();
            const clientId = cfg.clientId || '';
            if (!clientId) return;

            const tryInit = () => {
                if (!window.google || !window.google.accounts || !window.google.accounts.id) {
                    setTimeout(tryInit, 200);
                    return;
                }
                window.google.accounts.id.initialize({
                    client_id: clientId,
                    // redirect 模式: 整页跳转 + 服务端回调, iOS Safari 比 popup 可靠得多
                    ux_mode: 'redirect',
                    login_uri: location.origin + '/api/auth/google-callback',
                    auto_select: false,
                });
                window.google.accounts.id.renderButton(
                    document.getElementById('googleBtnWrap'),
                    { theme: 'outline', size: 'large', width: 300, text: 'signin_with', shape: 'pill' }
                );
            };
            tryInit();
        } catch {}
    }

    async function handleGoogleCredential(resp) {
        try {
            const r = await fetch('/api/auth/google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ credential: resp.credential }),
            });
            const res = await r.json();
            if (!r.ok) {
                showMsg('googleMsg', res.error || '服务端错误', 'error');
                return;
            }
            localStorage.setItem('token', res.token);
            localStorage.setItem('user', JSON.stringify(res.user));
            window.rmTrack && rmTrack('login_success', { method: 'google', needsUsername: !!res.needsUsername });
            window.rmFlush && rmFlush(true);
            if (res.needsUsername) {
                const next = encodeURIComponent(getRedirect());
                window.location.href = '/complete-username.html?redirect=' + next;
            } else {
                window.location.href = getRedirect();
            }
        } catch (err) {
            showMsg('googleMsg', '网络错误: ' + err.message, 'error');
        }
    }

    initGoogleSignIn();

    async function handleRegister(e) {
        e.preventDefault();
        const form = e.target;
        const data = {
            username: form.username.value,
            password: form.password.value,
            email: form.email.value,
            phone: form.phone.value || undefined,
        };

        window.rmTrack && rmTrack('register_submit', {});
        try {
            const r = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data),
            });
            const res = await r.json();

            if (r.ok) {
                window.rmTrack && rmTrack('register_success', {});
                showMsg('registerMsg', res.message, 'success');
                setTimeout(() => showTab('login'), 1500);
            } else {
                window.rmTrack && rmTrack('register_fail', { error: res.error });
                showMsg('registerMsg', res.error, 'error');
            }
        } catch {
            showMsg('registerMsg', '网络错误', 'error');
        }
    }
</script>
</body>
</html>
